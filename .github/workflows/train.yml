name: Entrenamiento Nocturno del Bebé

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM cada día
  workflow_dispatch:  # Manual también

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4  # Actualizado a v4
    
    - name: Setup Python
      uses: actions/setup-python@v5  # Actualizado a v5
      with:
        python-version: '3.10'
    
    - name: Cache modelos
      uses: actions/cache@v4  # Actualizado a v4
      with:
        path: checkpoints/
        key: bebe-checkpoints-${{ github.run_id }}
        restore-keys: |
          bebe-checkpoints-
    
    - name: Instalar dependencias
      run: |
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install -e .
    
    - name: Dormir y aprender
      run: |
        python -c "
        from bebe_ia.main import BebeIA
        bebe = BebeIA()
        bebe.initialize()
        bebe.sleep()  # Entrenamiento profundo
        "
    
    - name: Subir checkpoint
      uses: actions/upload-artifact@v4  # ✅ ACTUALIZADO A V4
      with:
        name: bebe-entrenado-${{ github.run_number }}
        path: checkpoints/*.pt
        retention-days: 30  # Guardar por 30 días
        compression-level: 6  # Compresión para archivos grandes
