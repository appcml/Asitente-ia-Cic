<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍼 Bebé IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }
        
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            font-size: 0.9em;
        }
        
        .status-item {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
        }
        
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .message {
            margin-bottom: 15px;
            max-width: 80%;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            margin-left: auto;
        }
        
        .message-content {
            padding: 12px 18px;
            border-radius: 20px;
            word-wrap: break-word;
        }
        
        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .message.bot .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .message-info {
            font-size: 0.8em;
            color: #999;
            margin-top: 5px;
            margin-left: 10px;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
        }
        
        .input-container {
            display: flex;
            gap: 10px;
        }
        
        #userInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }
        
        #userInput:focus {
            border-color: #667eea;
        }
        
        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            padding: 10px 20px;
            font-size: 0.9em;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
        }
        
        .typing {
            display: none;
            padding: 10px;
            color: #667eea;
            font-style: italic;
        }
        
        .typing.show {
            display: block;
        }
        
        .emotion {
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍼 Bebé IA</h1>
            <p>Un asistente que aprende y crece contigo</p>
            <div class="status-bar">
                <span class="status-item">Etapa: <span id="stage">-</span></span>
                <span class="status-item">😊 <span id="emotion">-</span></span>
                <span class="status-item">🧠 <span id="memories">0</span> memorias</span>
            </div>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="message bot">
                <div class="message-content">
                    ¡Hola! Soy Bebé IA 🍼<br>
                    Estoy empezando a aprender. ¿Me enseñas cosas?
                </div>
                <div class="message-info">Bebé IA</div>
            </div>
        </div>
        
        <div class="typing" id="typing">Bebé está pensando...</div>
        
        <div class="input-area">
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Escribe un mensaje..." autocomplete="off">
                <button class="btn btn-primary" onclick="sendMessage()">Enviar</button>
            </div>
            <div class="controls">
                <button class="btn btn-secondary" onclick="sleep()">😴 Dormir</button>
                <button class="btn btn-secondary" onclick="showTeach()">🎓 Enseñar</button>
            </div>
        </div>
    </div>

    <script>
        let conversationHistory = [];
        
        // Enviar mensaje al presionar Enter
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Agregar mensaje del usuario
            addMessage(message, 'user');
            input.value = '';
            
            // Mostrar "escribiendo..."
            document.getElementById('typing').classList.add('show');
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: message})
                });
                
                const data = await response.json();
                
                // Ocultar "escribiendo..."
                document.getElementById('typing').classList.remove('show');
                
                // Agregar respuesta del bot
                addMessage(data.response + ' ' + getEmoji(data.emotion), 'bot');
                
                // Actualizar estado
                updateStatus(data);
                
            } catch (error) {
                document.getElementById('typing').classList.remove('show');
                addMessage('Ups, me dormí un poco... 😴', 'bot');
            }
        }
        
        function addMessage(text, sender) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            const infoDiv = document.createElement('div');
            infoDiv.className = 'message-info';
            infoDiv.textContent = sender === 'user' ? 'Tú' : 'Bebé IA';
            
            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(infoDiv);
            chatArea.appendChild(messageDiv);
            
            // Scroll al final
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function getEmoji(emotion) {
            const emojis = {
                'feliz': '😊',
                'triste': '😢',
                'curioso': '🤔',
                'emocionado': '😃',
                'confundido': '😕'
            };
            return emojis[emotion] || '😊';
        }
        
        function updateStatus(data) {
            document.getElementById('stage').textContent = data.stage;
            document.getElementById('emotion').textContent = data.emotion;
            document.getElementById('memories').textContent = data.memories;
        }
        
        async function sleep() {
            addMessage('💤 Me voy a dormir un rato para aprender...', 'bot');
            
            try {
                const response = await fetch('/sleep', {method: 'POST'});
                const data = await response.json();
                addMessage('✨ ¡Ya desperté! Ahora sé más cosas', 'bot');
            } catch (error) {
                addMessage('😴 Zzz...', 'bot');
            }
        }
        
        function showTeach() {
            const correct = prompt('¿Cuál debería haber sido la respuesta correcta?');
            if (correct) {
                teach(correct);
            }
        }
        
        async function teach(correctResponse) {
            try {
                const response = await fetch('/teach', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        correct: correctResponse,
                        score: 1.0
                    })
                });
                
                addMessage('🎓 ¡Gracias por enseñarme!', 'bot');
            } catch (error) {
                addMessage('❌ No pude aprender eso ahora', 'bot');
            }
        }
        
        // Cargar estado inicial
        async function loadStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();
                updateStatus(data);
            } catch (e) {
                console.log('No se pudo cargar el estado');
            }
        }
        
        loadStatus();
    </script>
</body>
</html>
